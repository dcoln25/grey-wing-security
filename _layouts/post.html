---
layout: default
---
<article class="post-content">
  <div class="container">
    <header class="post-header">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
        {% if page.author %}<span class="post-author">by {{ page.author }}</span>{% endif %}
        {% if page.tags %}
        <div class="post-tags">
          {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
        </div>
        {% endif %}
      </div>
    </header>
    <div class="post-body">
      {{ content }}
    </div>
    <div class="post-nav">
      <a href="{{ '/blog/' | relative_url }}">&larr; Back to Blog</a>
    </div>
  </div>
</article>
