    color: "#0ea5e9"
    image: "images/logo.jpg"
  - pretitle: "Compliance"
    pretext: "Framework-aligned security"
    title: "Achieve and maintain compliance without slowing your team"
    text: "We help you navigate NIST CSF, SOC 2, HIPAA, PCI DSS, and privacy requirements with practical controls that fit your environment."
    icon: "fa-solid fa-list-check"
    color: "#0891b2"
    image: "images/logo.jpg"
